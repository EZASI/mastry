<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>404 — ページが見つかりません · MASTRY</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">

<style>
  :root{--ink:#0e1b2c;--bone:#f7f5f0;--accent:#2563eb}
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;display:grid;place-items:center;background:linear-gradient(165deg,#f7f9fc 0%,#e8eef6 100%);
    font-family:'Hiragino Mincho ProN','Yu Mincho',serif;color:var(--ink);text-align:center;padding:24px}
  .mark{font-size:.8rem;letter-spacing:.55em;text-indent:.55em;opacity:.55;margin-bottom:28px}
  h1{font-size:clamp(2.2rem,7vw,3.6rem);font-weight:600;letter-spacing:.06em;margin-bottom:14px}
  p{font-size:.98rem;line-height:2;opacity:.75;margin-bottom:34px}
  .en{font-size:.85rem;opacity:.5;display:block;margin-top:4px}
  a.btn{display:inline-block;padding:14px 38px;border:1px solid var(--ink);border-radius:999px;
    color:var(--ink);text-decoration:none;font-size:.92rem;letter-spacing:.18em;text-indent:.18em;transition:all .3s}
  a.btn:hover{background:var(--ink);color:var(--bone)}
  .links{margin-top:26px;font-size:.85rem}
  .links a{color:var(--accent);text-decoration:none;margin:0 10px}
  .links a:hover{text-decoration:underline}
</style>
</head>
<body>
<main>
  <div class="mark">M A S T R Y</div>
  <h1>静けさの、その先へ。</h1>
  <p>お探しのページは見つかりませんでした。<br>移動または削除された可能性があります。
  <span class="en">404 — The page you are looking for could not be found.</span></p>
  <a class="btn" href="/">トップへ戻る</a>
  <div class="links">
    <a href="/faq.html">FAQ</a>·<a href="/contact.html">お問い合わせ</a>
  </div>
</main>
</body>
</html>
