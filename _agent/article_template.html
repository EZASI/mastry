<style>
  :root{--ink:#0e1b2c;--dim:#5a6b80;--line:#dbe3ee;--accent:#2563eb}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Hiragino Mincho ProN','Yu Mincho',serif;color:var(--ink);background:linear-gradient(170deg,#f8fafd,#eef3f9)}
  header{padding:26px clamp(20px,5vw,60px);display:flex;justify-content:space-between;align-items:center}
  .logo{letter-spacing:.5em;text-indent:.5em;font-size:1.05rem;text-decoration:none;color:var(--ink)}
  .back{font-size:.85rem;color:var(--accent);text-decoration:none}
  article{max-width:720px;margin:0 auto;padding:26px 22px 80px}
  time{display:block;text-align:center;font-size:.8rem;color:var(--dim);letter-spacing:.18em;margin-bottom:14px}
  h1{font-size:clamp(1.7rem,4.6vw,2.4rem);font-weight:600;line-height:1.8;text-align:center;margin-bottom:38px}
  article h2{font-size:1.25rem;font-weight:600;margin:44px 0 16px;line-height:1.8;border-left:3px solid var(--accent);padding-left:14px}
  article p{font-size:.98rem;line-height:2.2;margin-bottom:20px}
  article ul{margin:0 0 20px 1.4em}
  article li{font-size:.95rem;line-height:2.1}
  .cta{margin-top:54px;padding:30px;background:#fff;border:1px solid var(--line);border-radius:16px;text-align:center}
  .cta p{font-size:.92rem;color:var(--dim);margin-bottom:16px}
  .cta a{display:inline-block;padding:12px 34px;background:var(--accent);color:#fff;text-decoration:none;border-radius:999px;font-size:.9rem;letter-spacing:.12em}
  footer{text-align:center;font-size:.78rem;color:var(--dim);padding:40px 20px;letter-spacing:.1em}
  footer a{color:var(--dim)}
</style>
</head>
<body>
<header><a class="logo" href="/">MASTRY</a><a class="back" href="/journal/">← ジャーナル一覧</a></header>
<article>
  <time datetime="{{DATE}}">{{DATE_DISPLAY}}</time>
  <h1>{{TITLE}}</h1>
  {{BODY}}
  <div class="cta">
    <p>MASTRY — ギリシャ・ヒオス島のマスティハ × 日本の湧水。<br>数量限定の初回ロットを先行販売中です。</p>
    <a href="/#offer">先行販売に登録する →</a>
  </div>
</article>
<footer>© MMXXVI MASTRY合同会社 · <a href="/">mastry.jp</a></footer>
